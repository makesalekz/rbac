//kratos:client
syntax = "proto3";

import "google/api/annotations.proto";
import "errors/errors.proto";
import "api/rbac/permissions/v1/permissions.proto";

package api.rbac.roles.v1;

option go_package = "rbac/api/rbac/roles/v1;roles_v1";
option java_multiple_files = true;
option java_package = "api.rbac.roles.v1";

service Roles {
  rpc CreateRole (CreateRoleRequest) returns (RoleReply) {
    option (google.api.http) = {
      post: "/v1/rbac/roles"
      body: "*"
    };
  };
  rpc UpdateRole (UpdateRoleRequest) returns (RoleReply) {
    option (google.api.http) = {
      put: "/v1/rbac/roles/{roleId}"
      body: "*"
    };
  };
  rpc DeleteRole (DeleteRoleRequest) returns (EmptyReply) {
    option (google.api.http) = {
      delete: "/v1/rbac/roles/{roleId}"
    };
  };
  rpc GetRole (GetRoleRequest) returns (RoleReply) {
    option (google.api.http) = {
      get: "/v1/rbac/roles/{roleId}"
    };
  };
  rpc ListRoles (ListRolesRequest) returns (ListRolesReply){
    option (google.api.http) = {
      get: "/v1/rbac/roles"
    };
  };
  rpc AddPermissionToRole (AddPermissionToRoleRequest) returns (AddPermissionToRoleReply){
    option (google.api.http) = {
      post: "/v1/rbac/roles/{roleId}/permissions"
      body: "*"
    };
  };
  rpc RemovePermissionFromRole (RemovePermissionFromRoleRequest) returns (EmptyReply){
    option (google.api.http) = {
      delete: "/v1/rbac/roles/{roleId}/permissions/{permissionId}"
    };
  };
  rpc ListRolePermissions (RolesPermissionsRequest) returns (RolesPermissionsReply){
    option (google.api.http) = {
      get: "/v1/rbac/roles/{roleId}/permissions"
    };
  };
}

message EmptyRequest {}

message EmptyReply {}

message RoleReply {
  int64 id = 1;
  string name = 2;
  string description = 3;
  int64 teamId = 4;
  string createdAt = 5;
  string updatedAt = 6;
  string deletedAt = 7;
}

message CreateRoleRequest {
  string name = 1;
  string description = 2;
  int64 teamId = 3;
}

message UpdateRoleRequest {
  int64 roleId = 1;
  string name = 2;
  string description = 3;
}

message DeleteRoleRequest {
  int64 roleId = 1;
}

message GetRoleRequest {
  int64 roleId = 1;
}

message ListRolesRequest {
  int64 teamId = 1;
  optional string name = 2;
}

message ListRolesReply {
  repeated RoleReply roles = 1;
}

message AddPermissionToRoleRequest {
  int64 roleId = 1;
  string permissionId = 2;
  repeated string fields = 3;
}

message AddPermissionToRoleReply {
  int64 roleId = 1;
  api.rbac.permissions.v1.PermissionReply permissions = 2;
}

message RemovePermissionFromRoleRequest {
  int64 roleId = 1;
  string permissionId = 2;
}

message RolesPermissionsRequest {
  int64 roleId = 1;
}

message RolesPermissionsReply {
  repeated api.rbac.permissions.v1.PermissionReply permissions = 1;
}

enum ErrorReason {
  // Set default error code.
  option (errors.default_code) = 500;

  // Set the error code separately for an enumeration.
  INTERNAL = 0;
  GRPC_CONNECTION = 1;
  SERVICE_FAILED = 2;
  DATABASE_QUERY = 3;

  INVALID_REQUEST = 10 [(errors.code) = 400];
  INVALID_PHONE_NUMBER = 11 [(errors.code) = 400];
  INVALID_TOKEN = 12 [(errors.code) = 401];
  INVALID_CODE = 13 [(errors.code) = 401];

  USER_NOT_FOUND = 20 [(errors.code) = 404];
}