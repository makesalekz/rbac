syntax = "proto3";

package rbac.v1;

import "google/api/annotations.proto";
import "api/utils/v1/models.proto";
import "api/rbac/v1/models.proto";

option go_package = "gitlab.calendaria.team/services/rbac/api/rbac/v1;rbac_v1";
option java_multiple_files = true;
option java_package = "rbac.v1";

service Roles {
  rpc CreateRole(CreateRoleRequest) returns (RoleReply) {
    option (google.api.http) = {
      post: "/v1/rbac/roles"
      body: "*"
    };
  };
  rpc UpdateRole(UpdateRoleRequest) returns (RoleReply) {
    option (google.api.http) = {
      put: "/v1/rbac/roles/{roleId}"
      body: "*"
    };
  };
  rpc DeleteRole(RoleRequest) returns (utils.v1.EmptyReply) {
    option (google.api.http) = {
      delete: "/v1/rbac/roles/{roleId}"
    };
  };
  rpc GetRole(RoleRequest) returns (RoleReply) {
    option (google.api.http) = {
      get: "/v1/rbac/roles/{roleId}"
    };
  };
  rpc ListRoles(ListRolesRequest) returns (ListRolesReply) {
    option (google.api.http) = {
      post: "/v1/rbac/roles/list"
      body: "*"
    };
  };
  rpc AddPermissionToRole(AddPermissionToRoleRequest)
      returns (utils.v1.EmptyReply) {
    option (google.api.http) = {
      post: "/v1/rbac/roles/{roleId}/permissions"
      body: "*"
    };
  };
  rpc DeleteRolePermission(RemovePermissionFromRoleRequest)
      returns (utils.v1.EmptyReply) {
    option (google.api.http) = {
      delete: "/v1/rbac/roles/{roleId}/permissions/{permissionId}"
    };
  };
  rpc ListRolePermissions(RoleRequest) returns (RolePermissionsReply) {
    option (google.api.http) = {
      post: "/v1/rbac/roles/{roleId}/permissions/list"
      body: "*"
    };
  };
}

message CreateRoleRequest {
  string name = 1;
  string description = 2;
  bool isSystem = 3;
  repeated string allow = 4;
  repeated string deny = 5;
}

message RoleReply {
  Role role = 1;
}

message UpdateRoleRequest {
  int64 roleId = 1;
  string name = 2;
  string description = 3;
  repeated string allow = 4;
  repeated string deny = 5;
}

message RoleRequest {
  int64 roleId = 3;
}

message ListRolesRequest {
  string search = 1;
}

message ListRolesReply {
  repeated Role roles = 1;
}

message AddPermissionToRoleRequest {
  int64 roleId = 1;
  string permissionId = 2;
  optional bool deny = 3;
  repeated string fields = 4;
}

message RemovePermissionFromRoleRequest {
  int64 roleId = 1;
  string permissionId = 2;
}

message RolePermissionsReply {
  repeated RolePermission permissions = 1;
}

message RolePermission {
  string id = 1;
  bool deny = 2;
  repeated string fields = 3;
}