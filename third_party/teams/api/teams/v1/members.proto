syntax = "proto3";

package api.teams.v1;

import "google/api/annotations.proto";
import "teams/v1/models.proto";

option go_package = "teams/api/teams/v1;teams_v1";
option java_multiple_files = true;
option java_package = "api.teams.v1";

service Members {
	rpc CreateMembers (CreateMembersRequest) returns (CreateMembersReply) {
		option (google.api.http) = {
			post: "/v1/teams/{teamId}/members"
			body: "*"
		};
	};
	rpc DeleteMember (DeleteMemberRequest) returns (DeleteMemberReply) {
		option (google.api.http) = {
			delete: "/v1/teams/{teamId}/members/{userId}"
		};
	};
	rpc GetMembers (GetMembersRequest) returns (GetMembersReply);
	rpc ListMembers (ListMembersRequest) returns (ListMembersReply) {
		option (google.api.http) = {
			post: "/v1/teams/{teamId}/members/list"
			body: "*"
		};
	};
}

message CreateMembersRequest {
	int64 teamId = 1;
	repeated int64 usersIds = 2;
}
message CreateMembersReply {}

message DeleteMemberRequest {
	int64 teamId = 1;
	int64 userId = 2;
}
message DeleteMemberReply {}

message GetMembersRequest {
	int64 teamId = 1;
	repeated int64 usersIds = 2;
}
message GetMembersReply {
	repeated MemberShort members = 1;
}

message ListMembersRequest {
	int64 teamId = 1;
	PaginateRequest paginate = 2;
}
message ListMembersReply {
	repeated Member members = 1;
	PaginateReply paginate = 2;
}